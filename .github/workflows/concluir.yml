name: Concluir atividades (Notion)

on:
  schedule:
  # 11:00 UTC = 08:00 Brasil
  - cron: "0 11 * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm install

      - name: Rodar automação
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATASOURCE_ID: ${{ secrets.NOTION_DATASOURCE_ID }}
        run: npm run concluir